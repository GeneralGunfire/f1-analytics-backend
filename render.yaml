services:
  - type: web
    name: f1-analytics-backend
    runtime: python
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: FF1_CACHE_DIR
        value: /opt/render/project/src/cache/fastf1
      - key: CORS_ORIGINS
        sync: false   # set this in the Render dashboard
    autoDeploy: true
